name: Download Files (Auto)

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      folder:
        description: 'Папка для сохранения (например: books/Китобҳои дарсӣ/Синфи 1)'
        required: true
        default: 'books/Китобҳои дарсӣ/Синфи 1'
      urls:
        description: 'Ссылки на файлы (каждая с новой строки)'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download files
        run: |
          FOLDER="${{ github.event.inputs.folder }}"
          mkdir -p "$FOLDER"

          # Читаем ссылки из многострочного ввода
          echo "${{ github.event.inputs.urls }}" > /tmp/urls.txt

          counter=1
          total=$(wc -l < /tmp/urls.txt)

          while IFS= read -r url; do
            # Пропускаем пустые строки
            [ -z "$url" ] && continue

            echo "[$counter] Processing: $url"

            # Получаем имя файла из URL или Content-Disposition
            filename=$(curl -sI -L "$url" 2>/dev/null | grep -i "content-disposition" | sed 's/.*filename="//;s/".*//;s/.*filename=//;s/;.*//')

            # Если не нашли в заголовках, берём из URL
            if [ -z "$filename" ]; then
              filename=$(basename "$url" | sed 's/[?#].*$//')
            fi

            # Если всё ещё нет имени, генерируем
            if [ -z "$filename" ] || [ "$filename" = "/" ]; then
              # Определяем расширение из Content-Type
              ext=$(curl -sI -L "$url" 2>/dev/null | grep -i "content-type" | sed 's/.*\///;s/;.*//' | tr -d '\r')
              case "$ext" in
                pdf) ext="pdf" ;;
                epub) ext="epub" ;;
                zip) ext="zip" ;;
                *) ext="pdf" ;;
              esac
              filename="book_${counter}.${ext}"
            fi

            # Очищаем имя файла
            filename=$(echo "$filename" | sed 's/[^a-zA-Z0-9А-Яа-яЁёҒғӢӣҚқӮӯҲҳҶҷ._-]/_/g' | sed 's/__*/_/g')

            echo "  Filename: $filename"

            # Скачиваем с заголовками браузера
            curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"                  -H "Accept: application/pdf,*/*"                  --fail -o "$FOLDER/$filename" "$url" 2>&1 | tail -5

            if [ -f "$FOLDER/$filename" ] && [ -s "$FOLDER/$filename" ]; then
              size=$(ls -lh "$FOLDER/$filename" | awk '{print $5}')
              echo "  ✓ Downloaded: $size"
            else
              echo "  ✗ Failed or empty"
              rm -f "$FOLDER/$filename"
            fi

            counter=$((counter + 1))
            sleep 2
          done < /tmp/urls.txt

          echo ""
          echo "=== Result ==="
          ls -lah "$FOLDER/"

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Add files to ${{ github.event.inputs.folder }} - $(date +%Y-%m-%d)" || echo "No changes"
          git push
