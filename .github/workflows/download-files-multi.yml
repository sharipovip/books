name: Download Files

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      folder:
        description: 'Papka dlya sohraneniya (naprimer: books/Sinfi_1)'
        required: true
        default: 'books/Sinfi_1'
      file1_url:
        description: 'Ssylka na fayl 1'
        required: true
      file1_name:
        description: 'Imya fayla 1 (s rasshireniem, naprimer: kniga.pdf)'
        required: true
      file2_url:
        description: 'Ssylka na fayl 2 (opcionalno)'
        required: false
      file2_name:
        description: 'Imya fayla 2'
        required: false
      file3_url:
        description: 'Ssylka na fayl 3 (opcionalno)'
        required: false
      file3_name:
        description: 'Imya fayla 3'
        required: false
      file4_url:
        description: 'Ssylka na fayl 4 (opcionalno)'
        required: false
      file4_name:
        description: 'Imya fayla 4'
        required: false
      file5_url:
        description: 'Ssylka na fayl 5 (opcionalno)'
        required: false
      file5_name:
        description: 'Imya fayla 5'
        required: false

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download files
        run: |
          FOLDER="${{ github.event.inputs.folder }}"
          mkdir -p "$FOLDER"

          # Download file 1 (required)
          URL="${{ github.event.inputs.file1_url }}"
          NAME="${{ github.event.inputs.file1_name }}"
          echo "[1/5] Downloading: $NAME"
          curl -L -A "Mozilla/5.0" -o "$FOLDER/$NAME" "$URL" 2>&1 | tail -2
          if [ -s "$FOLDER/$NAME" ]; then
            echo "  OK"
          else
            echo "  FAILED"
            rm -f "$FOLDER/$NAME"
          fi

          # Download file 2
          URL="${{ github.event.inputs.file2_url }}"
          NAME="${{ github.event.inputs.file2_name }}"
          if [ -n "$URL" ] && [ -n "$NAME" ]; then
            echo "[2/5] Downloading: $NAME"
            curl -L -A "Mozilla/5.0" -o "$FOLDER/$NAME" "$URL" 2>&1 | tail -2
            if [ -s "$FOLDER/$NAME" ]; then
              echo "  OK"
            else
              echo "  FAILED"
              rm -f "$FOLDER/$NAME"
            fi
          fi

          # Download file 3
          URL="${{ github.event.inputs.file3_url }}"
          NAME="${{ github.event.inputs.file3_name }}"
          if [ -n "$URL" ] && [ -n "$NAME" ]; then
            echo "[3/5] Downloading: $NAME"
            curl -L -A "Mozilla/5.0" -o "$FOLDER/$NAME" "$URL" 2>&1 | tail -2
            if [ -s "$FOLDER/$NAME" ]; then
              echo "  OK"
            else
              echo "  FAILED"
              rm -f "$FOLDER/$NAME"
            fi
          fi

          # Download file 4
          URL="${{ github.event.inputs.file4_url }}"
          NAME="${{ github.event.inputs.file4_name }}"
          if [ -n "$URL" ] && [ -n "$NAME" ]; then
            echo "[4/5] Downloading: $NAME"
            curl -L -A "Mozilla/5.0" -o "$FOLDER/$NAME" "$URL" 2>&1 | tail -2
            if [ -s "$FOLDER/$NAME" ]; then
              echo "  OK"
            else
              echo "  FAILED"
              rm -f "$FOLDER/$NAME"
            fi
          fi

          # Download file 5
          URL="${{ github.event.inputs.file5_url }}"
          NAME="${{ github.event.inputs.file5_name }}"
          if [ -n "$URL" ] && [ -n "$NAME" ]; then
            echo "[5/5] Downloading: $NAME"
            curl -L -A "Mozilla/5.0" -o "$FOLDER/$NAME" "$URL" 2>&1 | tail -2
            if [ -s "$FOLDER/$NAME" ]; then
              echo "  OK"
            else
              echo "  FAILED"
              rm -f "$FOLDER/$NAME"
            fi
          fi

          echo ""
          echo "=== Result ==="
          ls -lah "$FOLDER/"

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Add files to ${{ github.event.inputs.folder }}" || echo "No changes"
          git push
