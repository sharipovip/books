name: Download Files

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      folder:
        description: 'Folder path (use underscores, not spaces)'
        required: true
        default: 'books/Sinfi_1'
      urls:
        description: 'URLs (one per line)'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download files
        run: |
          FOLDER="${{ github.event.inputs.folder }}"
          mkdir -p "$FOLDER"

          # Save URLs to file
          echo "${{ github.event.inputs.urls }}" > /tmp/urls.txt

          counter=1

          while IFS= read -r url; do
            [ -z "$url" ] && continue

            echo "[$counter] URL: $url"

            # Get filename from URL
            filename=$(echo "$url" | sed 's/.*\///;s/[?#].*$//')

            # If no filename, generate one
            if [ -z "$filename" ] || [ "$filename" = "/" ]; then
              filename="book_$counter.pdf"
            fi

            # Add .pdf if no extension
            if ! echo "$filename" | grep -q '\.'; then
              filename="${filename}.pdf"
            fi

            echo "  Saving as: $filename"

            # Download with browser headers
            curl -L               -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"               -o "$FOLDER/$filename"               "$url" 2>&1 | tail -3

            # Check if downloaded
            if [ -s "$FOLDER/$filename" ]; then
              size=$(ls -lh "$FOLDER/$filename" | awk '{print $5}')
              echo "  OK: $size"
            else
              echo "  FAILED"
              rm -f "$FOLDER/$filename"
            fi

            counter=$((counter + 1))
            sleep 2
          done < /tmp/urls.txt

          echo ""
          echo "=== Files in $FOLDER ==="
          ls -lah "$FOLDER/"

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Add files to ${{ github.event.inputs.folder }}" || echo "No changes"
          git push
