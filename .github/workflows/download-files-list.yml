name: Download Files

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      folder:
        description: 'Papka (naprimer: books/Sinfi_1)'
        required: true
        default: 'books/Sinfi_1'
      files:
        description: 'Kazhdaya stroka: URL,imya_fayla.pdf'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download files
        run: |
          FOLDER="${{ github.event.inputs.folder }}"
          mkdir -p "$FOLDER"

          # Read input and process each line
          echo "${{ github.event.inputs.files }}" > /tmp/files.txt

          counter=1
          while IFS= read -r line; do
            [ -z "$line" ] && continue

            # Split by comma: URL,filename
            URL=$(echo "$line" | cut -d',' -f1 | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            NAME=$(echo "$line" | cut -d',' -f2 | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')

            if [ -z "$URL" ] || [ -z "$NAME" ]; then
              echo "[$counter] Propusk: pustaya stroka"
              counter=$((counter + 1))
              continue
            fi

            echo "[$counter] Skachivanie: $NAME"
            echo "  URL: $URL"

            curl -L -A "Mozilla/5.0" -o "$FOLDER/$NAME" "$URL" 2>&1 | tail -2

            if [ -s "$FOLDER/$NAME" ]; then
              size=$(ls -lh "$FOLDER/$NAME" | awk '{print $5}')
              echo "  OK: $size"
            else
              echo "  FAILED"
              rm -f "$FOLDER/$NAME"
            fi

            counter=$((counter + 1))
            sleep 2
          done < /tmp/files.txt

          echo ""
          echo "=== Result ==="
          ls -lah "$FOLDER/"

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Add files to ${{ github.event.inputs.folder }}" || echo "No changes"
          git push
