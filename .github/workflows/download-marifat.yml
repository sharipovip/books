name: Download Books from Marifat.tj

on:
  workflow_dispatch:
    inputs:
      category_url:
        description: 'URL категории'
        required: true
        default: 'https://marifat.tj/books/адабиёти-мактабӣ'
      folder_name:
        description: 'Название папки'
        required: true
        default: 'Адабиёти мактабӣ'

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Puppeteer
        run: npm install puppeteer
        
      - name: Run download script
        run: node download.js
        env:
          CATEGORY_URL: ${{ github.event.inputs.category_url }}
          FOLDER_NAME: ${{ github.event.inputs.folder_name }}
          
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add books/
          git commit -m "Add books from marifat.tj: ${{ github.event.inputs.folder_name }} - $(date +%Y-%m-%d)" || echo "No changes"
          git push
